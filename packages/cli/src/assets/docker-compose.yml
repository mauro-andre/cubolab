# Copiado pra ~/.cubolab/ em `cubolab up`. Volumes relativos (`./`) resolvem
# pro diretório do compose file, o que equivale a ~/.cubolab/ em runtime —
# onde moram pebble-cert.pem, pebble-key.pem e pebble-config.json.
#
# container_name fixo pra ambos (cubolab-pebble / cubolab-challtestsrv) é
# contrato público (ARCH §Public contracts §5). `cubolab status` detecta a
# stack por lookup desses nomes via `podman ps`/`docker ps`.

services:
    pebble:
        image: ghcr.io/letsencrypt/pebble:latest
        container_name: cubolab-pebble
        command:
            - -config=/config/pebble-config.json
            - -dnsserver=10.30.50.3:8053
        volumes:
            - ./pebble-config.json:/config/pebble-config.json:ro,z
            - ./pebble-cert.pem:/config/pebble-cert.pem:ro,z
            - ./pebble-key.pem:/config/pebble-key.pem:ro,z
        ports:
            - "14000:14000"
            - "15000:15000"
        environment:
            PEBBLE_VA_ALWAYS_VALID: "0"
            PEBBLE_WFE_NONCEREJECT: "0"
        networks:
            acmenet:
                ipv4_address: 10.30.50.2

    challtestsrv:
        image: ghcr.io/letsencrypt/pebble-challtestsrv:latest
        container_name: cubolab-challtestsrv
        command:
            - -defaultIPv6=
            - -defaultIPv4=
        ports:
            - "8053:8053/tcp"
            - "8053:8053/udp"
            - "8055:8055"
        networks:
            acmenet:
                ipv4_address: 10.30.50.3

    # cf-shim: Cloudflare API shim. `build.context` é injetado pelo CLI em
    # `CUBOLAB_CF_SHIM_CONTEXT` (monorepo root) via `import.meta.resolve`.
    # Primeira `up` build a imagem (~1-2min); re-ups usam cache do podman.
    #
    # Volume: ~/.cubolab/ do host (injetado em `CUBOLAB_HOME`) monta em /data
    # do container. `@cubolab/core` resolve `state.json` via env var
    # CUBOLAB_HOME → /data/state.json. `:Z` é o label SELinux Fedora-friendly
    # (ver BUILD.md pro trade-off; outros hosts sem SELinux ignoram).
    cf-shim:
        build:
            context: ${CUBOLAB_CF_SHIM_CONTEXT}
            dockerfile: packages/cf-shim/Dockerfile
        container_name: cubolab-cf-shim
        depends_on:
            - challtestsrv
        ports:
            - "4500:4500"
        environment:
            CUBOLAB_ZONES: ${CUBOLAB_ZONES:-}
            CUBOLAB_HOME: /data
        volumes:
            - ${CUBOLAB_HOME}:/data:z
        networks:
            acmenet:
                ipv4_address: 10.30.50.4

networks:
    acmenet:
        driver: bridge
        ipam:
            driver: default
            config:
                - subnet: 10.30.50.0/24
